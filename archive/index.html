<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Sky-Archive of Stoneheart</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cinzel:wght@500;600&display=swap" rel="stylesheet" />
<style>
  /* ---- Stoneheart theme: cool slate, lichen-bronze, traveler's blue ---- */
  :root {
    --ink: #12151a;          /* page ground: slate-black */
    --ink-raised: #1a2027;   /* panels */
    --parchment: #dcd8ca;    /* primary text */
    --parchment-dim: #94917f;
    --accent: #a8b07c;       /* lichen on old stone */
    --visitor: #7d97ad;      /* traveler's blue */
    --rule: #2c3138;
    --display: "Cinzel", serif;
    --body: "Cormorant Garamond", Georgia, serif;
    /* Swap the archive image here: */
    --portrait: url("/images/factions/theWorldIsRound.jpg");
    --portrait-focus: 50% 38%; /* which part of the image stays in frame */
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--ink);
    color: var(--parchment);
    font-family: var(--body);
    font-size: 1.125rem;
    line-height: 1.55;
    display: flex;
  }

  /* ---- left pane: the archivist at his globe ---- */
  .portrait {
    flex: 1;
    min-width: 0;
    position: relative;
    background: var(--portrait) var(--portrait-focus) / cover no-repeat var(--ink);
  }
  .portrait::after {
    /* dissolve the image into the chat pane instead of a hard edge */
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to right,
      rgba(18, 21, 26, 0.12) 0%,
      rgba(18, 21, 26, 0.35) 62%,
      var(--ink) 100%);
  }

  .court {
    flex: 0 1 720px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0 1.25rem;
  }

  /* Narrow screens: no room for a split — the portrait becomes a
     faint full-screen backdrop behind the chat instead. */
  @media (max-width: 860px) {
    .portrait {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.16;
    }
    .portrait::after { background: none; }
    .court { flex: 1; }
  }

  header {
    text-align: center;
    padding: 1.75rem 0 1.25rem;
    border-bottom: 1px solid var(--rule);
  }
  header .eyebrow {
    font-family: var(--display);
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--parchment-dim);
  }
  header h1 {
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(1.4rem, 4vw, 1.9rem);
    color: var(--accent);
    margin-top: 0.4rem;
    letter-spacing: 0.06em;
  }
  header .decree {
    font-style: italic;
    color: var(--parchment-dim);
    font-size: 1rem;
    margin-top: 0.35rem;
  }
  header .return {
    display: inline-block;
    margin-top: 0.7rem;
    font-family: var(--display);
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--parchment-dim);
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 2px;
  }
  header .return:hover { color: var(--accent); border-bottom-color: var(--accent); }

  .scroll {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 0.25rem;
    scrollbar-width: thin;
    scrollbar-color: var(--rule) transparent;
  }

  .msg { margin-bottom: 1.4rem; max-width: 92%; }
  .msg .speaker {
    font-family: var(--display);
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .msg.archivist .speaker { color: var(--accent); }
  .msg.archivist .speaker::before { content: "✶ "; }
  .msg.visitor { margin-left: auto; text-align: right; }
  .msg.visitor .speaker { color: var(--visitor); }
  .msg .text { white-space: pre-wrap; }
  .msg.visitor .text { color: var(--parchment-dim); }

  .candle {
    display: inline-flex; gap: 6px; padding: 0.2rem 0;
  }
  .candle i {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); opacity: 0.25;
    animation: flicker 1.2s infinite;
  }
  .candle i:nth-child(2) { animation-delay: 0.2s; }
  .candle i:nth-child(3) { animation-delay: 0.4s; }
  @keyframes flicker { 40% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .candle i { animation: none; opacity: 0.7; }
  }

  form {
    display: flex;
    gap: 0.6rem;
    padding: 1rem 0 1.4rem;
    border-top: 1px solid var(--rule);
  }
  textarea {
    flex: 1;
    resize: none;
    background: var(--ink-raised);
    border: 1px solid var(--rule);
    border-radius: 3px;
    color: var(--parchment);
    font: inherit;
    padding: 0.65rem 0.8rem;
    height: 3.1rem;
  }
  textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  button {
    font-family: var(--display);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 3px;
    padding: 0 1.2rem;
    cursor: pointer;
  }
  button:hover, button:focus-visible { background: var(--accent); color: var(--ink); }
  button:disabled { opacity: 0.4; cursor: default; }
  textarea:disabled { opacity: 0.5; }

  .ended {
    text-align: center;
    font-family: var(--display);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--visitor);
    margin: 1.6rem 0;
  }
</style>
</head>
<body>
<div class="portrait" aria-hidden="true"></div>
<div class="court">
  <header>
    <div class="eyebrow">The Stoneheart Kingdom · The Sky-Archive</div>
    <h1>The Archivist</h1>
    <p class="decree">Ask freely. In Stoneheart, a question is a gift — even a foolish one.</p>
    <a class="return" href="/#faction/stoneheart-kingdom">← Descend the stairs</a>
  </header>

  <div class="scroll" id="scroll" aria-live="polite"></div>

  <form id="form">
    <textarea id="input" placeholder="Ask the archive…" maxlength="1000" required></textarea>
    <button id="send" type="submit">Ask</button>
  </form>
</div>

<script>
  const WORKER_URL = "https://zaoren.pankaj-pandit-java.workers.dev";
  const CHARACTER = "archivist";

  const scroll = document.getElementById("scroll");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const send = document.getElementById("send");

  // Session-only history (kept in memory; nothing stored).
  const messages = [];
  let audienceOver = false;

  addMsg("archivist", "A new face on the stairs — welcome, traveler. You have found the sky-archive of Stoneheart, where we keep what is known of the Garden: its turning year, its faiths, its kingdoms and their wars. Ask whatever you carry. Or, if you are newly arrived and the shelves overwhelm, simply ask where to begin — the kettle is warm either way.");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    addMsg("visitor", text);
    messages.push({ role: "user", content: text });
    input.value = "";
    send.disabled = true;

    const pending = addPending();

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ character: CHARACTER, messages }),
      });
      const data = await res.json();
      pending.remove();

      if (!res.ok) {
        addMsg("archivist", data.error || "The archive is closed for cataloguing.");
      } else {
        addMsg("archivist", data.reply);
        messages.push({ role: "assistant", content: data.reply });
        if (data.ended) endAudience();
      }
    } catch {
      pending.remove();
      addMsg("archivist", "The courier returned empty-handed. Ask again.");
    } finally {
      send.disabled = audienceOver;
      input.disabled = audienceOver;
      if (!audienceOver) input.focus();
    }
  });

  // The character can end the audience (abusive visitors are shown out).
  function endAudience() {
    audienceOver = true;
    input.value = "";
    input.placeholder = "The bridge-wardens have shown you out.";
    const div = document.createElement("div");
    div.className = "ended";
    div.textContent = "— T H E   A R C H I V E   I S   C L O S E D   T O   Y O U —";
    scroll.appendChild(div);
    scroll.scrollTop = scroll.scrollHeight;
  }

  // Enter sends; Shift+Enter for a newline.
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  function addMsg(who, text) {
    const div = document.createElement("div");
    div.className = "msg " + who;
    const speaker = who === "archivist" ? "The Archivist" : "You";
    div.innerHTML = `<div class="speaker"></div><div class="text"></div>`;
    div.querySelector(".speaker").textContent = speaker;
    div.querySelector(".text").textContent = text; // textContent = no injection
    scroll.appendChild(div);
    scroll.scrollTop = scroll.scrollHeight;
    return div;
  }

  function addPending() {
    const div = document.createElement("div");
    div.className = "msg archivist";
    div.innerHTML = `<div class="speaker">The Archivist</div>
      <div class="candle"><i></i><i></i><i></i></div>`;
    scroll.appendChild(div);
    scroll.scrollTop = scroll.scrollHeight;
    return div;
  }
</script>
</body>
</html>
